<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disease Checker — Age</title>
    <link rel="stylesheet" href="styles/age.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script defer src="script/script.js"></script>
</head>
<body>
    <div class="main">

        <div class="left">
            <div class="web-title">Disease Checker</div>
            <div class="progress">
                <div class="circle">
                    <div class="circle1" id="progressPercent">50%</div>
                    <div class="circle2" id="progressStep">Step 2/4</div>
                </div>
            </div>
            <div class="tabs">
                <div class="gender"><img class="icons" src="assets/gender.svg">Gender</div>
                <div class="age active"><img class="icons" src="assets/age.svg">Age</div>
                <div class="symptoms"><img class="icons" src="assets/symptom.svg">Symptoms</div>
                <div class="cure"><img class="icons" src="assets/cure.svg">Cure</div>
            </div>
        </div>

        <div class="right">
            <div class="r1">
                <div class="step">STEP 2/4</div>
                <div class="text1">Select your age group</div>
            </div>

            <div class="ruh">
                <button class="age-card" data-age="child">
                    <div class="age-title">Child</div>
                    <div class="age-range">0 – 12</div>
                </button>
                <button class="age-card" data-age="teen">
                    <div class="age-title">Teen</div>
                    <div class="age-range">13 – 19</div>
                </button>
                <button class="age-card" data-age="adult">
                    <div class="age-title">Adult</div>
                    <div class="age-range">20 – 59</div>
                </button>
                <button class="age-card" data-age="senior">
                    <div class="age-title">Senior</div>
                    <div class="age-range">60+</div>
                </button>
            </div>

            <div class="r3">
                <button class="previous">
                    <img src="assets/left-arrow.svg" class="btn-icon">
                    Previous
                </button>
                <button class="next" disabled>
                    Next
                </button>
            </div>
        </div>

    </div>
</body>
</html>
