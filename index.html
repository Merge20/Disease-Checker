<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disease Checker</title>
    <link rel="stylesheet" href="styles/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        (function() {
            try {
                var user = JSON.parse(localStorage.getItem("dc_current_user"));
                if (!user) { window.location.replace("login.html"); }
            } catch(e) { window.location.replace("login.html"); }
        })();
    </script>
    <script defer src="script/script.js"></script>
    <script defer src="script/auth.js"></script>
</head>
<body>
    <div class="main">

        <div class="left">
            <div class="web-title">Disease Checker</div>
            <div id="userGreeting" style="padding-left:20px;color:rgba(255,255,255,0.75);font-size:16px;margin-top:.5px;"></div>
            <div class="progress">
                <div class="circle">
                    <div class="circle1" id="progressPercent">25%</div>
                    <div class="circle2" id="progressStep">Step 1/4</div>
                </div>
            </div>
            <div class="tabs">
                <div class="gender active"><img class="icons" src="assets/gender.svg">Gender</div>
                <div class="age"><img class="icons" src="assets/age.svg">Age</div>
                <div class="symptoms"><img class="icons" src="assets/symptom.svg">Symptoms</div>
                <div class="cure"><img class="icons" src="assets/cure.svg">Cure</div>
                <div style="width:100%;height:55px;padding-left:20px;display:flex;align-items:center;gap:10px;color:rgba(255,255,255,0.7);font-size:14px;cursor:pointer;margin-top:auto;" onclick="logout()">
                    <svg style="width:16px;height:16px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Logout
                </div>
            </div>
        </div>

        <div class="right">
            <div class="r1">
                <div class="step">STEP 1/4</div>
                <div class="text1">Please select your gender</div>
            </div>

            <div class="ruh">
                <button class="male">
                    <img class="male-icon" src="assets/male.png">
                </button>
                <button class="female">
                    <img class="female-icon" src="assets/female.png">
                </button>
            </div>

            <div class="r3">
                <button class="previous" disabled>
                    <img src="assets/left-arrow.svg" class="btn-icon">
                    Previous
                </button>
                <button class="next" disabled>
                    Next
                </button>
            </div>
        </div>

    </div>
</body>
</html>
